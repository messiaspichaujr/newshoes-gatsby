services:
  frontend:
    container_name: newshoes-frontend
    build: ./services/frontend
    restart: unless-stopped
    ports:
      - "8889:8000"
    environment:
      STRAPI_API_URL: http://strapi:1337
      STRAPI_TOKEN: ${STRAPI_GATSBY_TOKEN:-dev-gatsby-token-change-in-production}
    volumes:
      - ./services/frontend/src:/app/src
      - ./services/frontend/gatsby-config.js:/app/gatsby-config.js
      - ./services/frontend/gatsby-node.js:/app/gatsby-node.js
    depends_on:
      strapi:
        condition: service_healthy

  strapi:
    container_name: newshoes-strapi
    build: ./services/strapi
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${STRAPI_APP_KEYS:-key1,key2,key3,key4}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT:-strapiTokenSalt123}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET:-strapiAdminJwt123}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT:-strapiTransfer123}
      JWT_SECRET: ${STRAPI_JWT_SECRET:-strapiJwt123}
      STRAPI_GATSBY_TOKEN: ${STRAPI_GATSBY_TOKEN:-dev-gatsby-token-change-in-production}
      STRAPI_ADMIN_EMAIL: ${STRAPI_ADMIN_EMAIL:-admin@newshoes.com.br}
      STRAPI_ADMIN_PASSWORD: ${STRAPI_ADMIN_PASSWORD:-Admin1234!}
      STRAPI_ADMIN_FIRSTNAME: ${STRAPI_ADMIN_FIRSTNAME:-Admin}
      STRAPI_ADMIN_LASTNAME: ${STRAPI_ADMIN_LASTNAME:-NewShoes}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:1337/admin"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    volumes:
      - strapi_data:/app/.tmp
      - ./services/strapi/src:/app/src

volumes:
  strapi_data:
